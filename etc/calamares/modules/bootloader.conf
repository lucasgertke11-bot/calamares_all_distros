# Bootloader configuration for Ubuntu/Debian

bootloaderName: grub
installEFIFallback: true
installForUEFI: true
installBootLoader: true

# GRUB Configuration
grubInstall: /usr/sbin/grub-install
grubMkconfig: /usr/sbin/grub-mkconfig
grubCfg: /boot/grub/grub.cfg
grubDefault: /boot/default
grubBootPrefix: /boot

# EFI Configuration
efiBootloaderEntry: ubuntu
efiSystemPartition: /boot/efi
efiMountPoint: /boot/efi

# Kernel parameters
kernelParams: []
bootloaderEntry: Ubuntu

# Secure boot
secureBootNull: false
writeBootLoaderId: true
writeFilesystemLabels: false
pmbrFallback: true
