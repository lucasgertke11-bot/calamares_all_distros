# Users configuration for Ubuntu/Debian

# Default groups for Ubuntu
defaultGroups:
  - users
  - wheel
  - audio
  - video
  - floppy
  - cdrom
  - tape
  - dialout
  - plugdev
  - netdev
  - bluetooth
  - scanner

# Password settings
requireStrongPasswords: true
allowWeakPasswords: false
minimumPasswordLength: 6

# Password encoding
passwordEncoding: "plaintext"

# Auto-login
autologinUser: ""

# Shell
userShell: /bin/bash

# Root
rootUserShell: /bin/bash
rootPassword: ""

# Hostname
hostnamePattern: "ubuntu-%d"
generateHostname: true
