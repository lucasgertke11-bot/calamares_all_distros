# Mirror selection for Ubuntu/Debian

# Available mirrors
mirrors:
  - id: "ubuntu"
    name: "Ubuntu Official"
    url: "http://archive.ubuntu.com/ubuntu/"
    countries:
      - "*"
    protocol: "http"

  - id: "ubuntu-br"
    name: "Ubuntu Brazil"
    url: "http://br.archive.ubuntu.com/ubuntu/"
    countries:
      - "BR"
    protocol: "http"

  - id: "ubuntu-legacy"
    name: "Ubuntu Legacy"
    url: "http://old-releases.ubuntu.com/ubuntu/"
    countries:
      - "*"
    protocol: "http"

# Choose mirror based on geoip or manual selection
geoip:
  enabled: true
  url: "https://geoip.ubuntu.com/lookup"

# Manual mirror selection
manualMirrorSelection: true

# Default mirror
defaultMirror: "ubuntu"
