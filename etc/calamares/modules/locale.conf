# Locale configuration for Ubuntu/Debian

backend: "glibc"

# Language settings
localeName: "en_US.UTF-8"

# Region and territory
region: "America"
territory: "São Paulo"

# Available locales
locales:
  - en_US.UTF-8
  - pt_BR.UTF-8
  - es_ES.UTF-8

# Set the system locale in /etc/locale.conf
systemLocale: "en_US.UTF-8"

# Keyboard layout for X11
x11Layout: "us"
x11Model: "pc105"
x11Variant: ""
x11Options: ""

# Write locale.gen
writeLocaleGen: true
