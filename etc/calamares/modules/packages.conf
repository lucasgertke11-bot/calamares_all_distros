# APT configuration for Ubuntu/Debian

backend: apt
update-db-tool: apt-get update
update-tool: apt-get upgrade
install-tool: apt-get install

operations:
  - &operations
    - &unpack
     /unpackfs:
        - archive: rootfs.squfs
          method: archive
    - &remove
      removing:
        - packages:
          - calamares

# Default packages to install
package_list:
  - ubuntu-standard
  - casper
  - ubiquity
  - gnome-shell
  - ubuntu-desktop
  - grub-efi-amd64
  - grub-pc
  - os-prober

# Remove packages
remove_packages: []

# Configuration files
aptConf: |
  APT::Get::AllowUnauthenticated "false";

sourcesList: |
  deb http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse
  deb http://archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse
  deb http://security.ubuntu.com/ubuntu/ noble-security main restricted universe multiverse
